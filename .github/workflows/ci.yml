# ============================================================
# CI Pipeline — Build, Test, Scan, Push
# ============================================================
# Triggers on every push and PR. Only pushes images on main branch.
#
# Pipeline flow:
#   1. Lint Dockerfiles (catch bad practices early)
#   2. Build all 4 images
#   3. Run tests
#   4. Security scan with Trivy (find CVEs before deploy)
#   5. Push to ECR (main branch only, tagged with git SHA)
# ============================================================

name: CI — Build & Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1

jobs:

  # ─────────────────────────────────────────────
  # Stage 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint Dockerfiles & YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/frontend/Dockerfile

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/backend/Dockerfile

      - name: Lint ETL Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/etl/Dockerfile

      - name: Lint MongoDB Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/mongodb/Dockerfile

      - name: Validate K8s manifests
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/

          shopt -s globstar nullglob
          for f in k8s/*.yaml k8s/**/*.yaml; do
            if [ -f "$f" ] && [[ "$f" != *"example"* ]]; then
              echo "Validating $f..."
              kubeconform -strict -summary "$f"
            fi
          done

  # ─────────────────────────────────────────────
  # Stage 2: Build & Test
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: false
          tags: baykar-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: false
          tags: baykar-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build ETL
        uses: docker/build-push-action@v5
        with:
          context: ./apps/etl
          push: false
          tags: baykar-etl:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build MongoDB
        uses: docker/build-push-action@v5
        with:
          context: ./apps/mongodb
          push: false
          tags: baykar-mongodb:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run backend tests
        working-directory: ./apps/backend
        run: |
          npm ci
          npm test

      - name: Start integration stack
        run: docker compose up -d --build mongodb backend frontend

      - name: Wait for stack readiness
        run: |
          for i in {1..12}; do
            if bash scripts/health-check.sh; then
              exit 0
            fi

            echo "Stack not ready yet (attempt $i/12); retrying in 10s..."
            sleep 10
          done

          echo "Integration stack failed readiness checks."
          exit 1

      - name: Run Cypress smoke tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/frontend
          install-command: npm ci
          wait-on: 'http://localhost:3000,http://localhost:5050/readyz/'
          config-file: cypress.json
          browser: electron

      # ── Security Scan ──
      # Trivy finds known CVEs in the container image.
      # We fail the pipeline on CRITICAL vulnerabilities.
      - name: Scan Frontend for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: baykar-frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1  # Fail pipeline on critical/high CVEs

      - name: Scan Backend for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: baykar-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan ETL for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: baykar-etl:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan MongoDB for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: baykar-mongodb:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Stop integration stack
        if: always()
        run: docker compose down -v --remove-orphans

  # ─────────────────────────────────────────────
  # Stage 3: Push to ECR (main only)
  # ─────────────────────────────────────────────
  push:
    name: Push Images to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write   # Required for OIDC federation (no static AWS keys!)
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Using OIDC federation instead of static access keys.
      # This is a security best practice — no long-lived credentials.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure required ECR repositories
        run: |
          REQUIRED_REPOS=(
            baykar-devops/frontend
            baykar-devops/backend
            baykar-devops/etl
            baykar-devops/mongodb
          )

          for repo in "${REQUIRED_REPOS[@]}"; do
            if ! aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "$repo" >/dev/null 2>&1; then
              echo "Creating missing ECR repository: $repo"
              aws ecr create-repository \
                --region "${AWS_REGION}" \
                --repository-name "$repo" \
                --image-tag-mutability IMMUTABLE \
                --image-scanning-configuration scanOnPush=true >/dev/null
            fi
          done

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/baykar-devops/frontend:${{ github.sha }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/baykar-devops/backend:${{ github.sha }}

      - name: Build and Push ETL
        uses: docker/build-push-action@v5
        with:
          context: ./apps/etl
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/baykar-devops/etl:${{ github.sha }}

      - name: Build and Push MongoDB
        uses: docker/build-push-action@v5
        with:
          context: ./apps/mongodb
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/baykar-devops/mongodb:${{ github.sha }}
