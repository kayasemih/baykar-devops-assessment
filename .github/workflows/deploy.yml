# ============================================================
# CD Pipeline — Deploy to Kubernetes
# ============================================================
# Runs automatically after CI succeeds on main branch.
#
# Flow:
#   1. Configure kubectl for EKS
#   2. Update image tags in K8s manifests with git SHA
#   3. Apply manifests
#   4. Wait for rollout to complete
#   5. Run smoke test
#   6. Auto-rollback on failure
# ============================================================

name: Deploy — EKS

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      monitoring_only:
        description: Only test monitoring manifests and Helm installs
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-eks
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  CLUSTER_NAME: baykar-devops-eks
  NAMESPACE: baykar-app

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    # Only deploy if CI passed
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check deployment prerequisites
        id: prerequisites
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASS: ${{ secrets.MONGO_ROOT_PASS }}
        run: |
          ready=true

          if ! aws eks describe-cluster --region "${{ env.AWS_REGION }}" --name "${{ env.CLUSTER_NAME }}" >/dev/null 2>&1; then
            echo "::warning::EKS cluster '${{ env.CLUSTER_NAME }}' was not found in region '${{ env.AWS_REGION }}'; skipping deployment."
            ready=false
          fi

          if [ -z "$ALERT_WEBHOOK_URL" ]; then
            echo "::warning::Missing GitHub secret: ALERT_WEBHOOK_URL; skipping deployment."
            ready=false
          fi

          if [ -z "$MONGO_ROOT_USER" ]; then
            echo "::warning::Missing GitHub secret: MONGO_ROOT_USER; skipping deployment."
            ready=false
          fi

          if [ -z "$MONGO_ROOT_PASS" ]; then
            echo "::warning::Missing GitHub secret: MONGO_ROOT_PASS; skipping deployment."
            ready=false
          fi

          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Skip deployment when prerequisites are missing
        if: steps.prerequisites.outputs.ready != 'true'
        run: echo "Deployment prerequisites are incomplete; deploy steps were skipped."

      - name: Login to ECR
        if: steps.prerequisites.outputs.ready == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure kubectl
        if: steps.prerequisites.outputs.ready == 'true'
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Install Helm
        if: steps.prerequisites.outputs.ready == 'true'
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Apply Kubernetes manifests
        if: steps.prerequisites.outputs.ready == 'true'
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASS: ${{ secrets.MONGO_ROOT_PASS }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/monitoring/namespace.yaml

          kubectl create secret generic mongodb-secret \
            --namespace ${{ env.NAMESPACE }} \
            --from-literal=mongo-root-username="$MONGO_ROOT_USER" \
            --from-literal=mongo-root-password="$MONGO_ROOT_PASS" \
            --dry-run=client -o yaml | kubectl apply -f -

          ALERTMANAGER_FILE=$(mktemp)
          cat > "$ALERTMANAGER_FILE" <<EOF
          global:
            resolve_timeout: 5m
          route:
            receiver: critical-webhook
            group_by: ['alertname']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 2h
          receivers:
            - name: critical-webhook
              webhook_configs:
                - url: ${ALERT_WEBHOOK_URL}
                  send_resolved: true
          EOF

          kubectl create secret generic alertmanager-config \
            --namespace monitoring \
            --from-file=alertmanager.yml="$ALERTMANAGER_FILE" \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f "$ALERTMANAGER_FILE"

          kubectl apply -f k8s/mongodb/statefulset.yaml
          kubectl apply -f k8s/mongodb/service.yaml
          kubectl apply -f k8s/backend/configmap.yaml
          kubectl apply -f k8s/backend/deployment.yaml
          kubectl apply -f k8s/backend/service.yaml
          kubectl apply -f k8s/backend/hpa.yaml
          kubectl apply -f k8s/frontend/deployment.yaml
          kubectl apply -f k8s/frontend/service.yaml
          kubectl apply -f k8s/frontend/hpa.yaml
          kubectl apply -f k8s/etl-cronjob.yaml
          kubectl apply -f k8s/network-policy.yaml

          kubectl apply -f k8s/monitoring/prometheus/alertmanager.yaml
          kubectl apply -f k8s/monitoring/loki/

          kubectl create configmap grafana-dashboards \
            --from-file=k8s/monitoring/grafana/dashboards/ \
            -n monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Install Prometheus
        if: steps.prerequisites.outputs.ready == 'true'
        run: |
          PROMETHEUS_STATUS=$(helm status monitoring-prometheus -n monitoring -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || true)

          if [[ "$PROMETHEUS_STATUS" == pending-* ]]; then
            LAST_GOOD_REVISION=$(helm history monitoring-prometheus -n monitoring -o json | jq -r '[.[] | select(.status == "deployed" or .status == "superseded")][-1].revision // empty')

            if [ -n "$LAST_GOOD_REVISION" ]; then
              echo "Release is $PROMETHEUS_STATUS; rolling back to revision $LAST_GOOD_REVISION before retrying."
              helm rollback monitoring-prometheus "$LAST_GOOD_REVISION" -n monitoring
            else
              echo "Release is $PROMETHEUS_STATUS with no good revision; uninstalling before retrying."
              helm uninstall monitoring-prometheus -n monitoring
            fi
          fi

          helm upgrade --install monitoring-prometheus prometheus-community/prometheus \
            --namespace monitoring \
            --values helm/monitoring/prometheus-values.yaml \
            --wait \
            --timeout 15m

      - name: Install Grafana
        if: steps.prerequisites.outputs.ready == 'true'
        run: |
          helm upgrade --install monitoring-grafana grafana/grafana \
            --namespace monitoring \
            --values helm/monitoring/grafana-values.yaml \
            --wait \
            --timeout 15m

      - name: Gather monitoring diagnostics on failure
        if: failure() && steps.prerequisites.outputs.ready == 'true'
        run: |
          echo "Monitoring Helm releases"
          helm list -n monitoring || true

          echo "Prometheus release status"
          helm status monitoring-prometheus -n monitoring || true

          echo "Grafana release status"
          helm status monitoring-grafana -n monitoring || true

          echo "Monitoring workloads"
          kubectl get all -n monitoring -o wide || true

          echo "Monitoring pods"
          kubectl get pods -n monitoring -o wide || true

          echo "Monitoring pod descriptions"
          kubectl describe pods -n monitoring || true

          echo "Prometheus server logs"
          kubectl logs deployment/monitoring-prometheus-server -n monitoring -c prometheus-server --tail=200 || true

          echo "Prometheus server previous logs"
          kubectl logs deployment/monitoring-prometheus-server -n monitoring -c prometheus-server --previous --tail=200 || true

          echo "Monitoring events"
          kubectl get events -n monitoring --sort-by=.lastTimestamp || true

      - name: Set runtime images
        if: steps.prerequisites.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.monitoring_only)
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          GIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

          kubectl set image statefulset/mongodb mongodb=${ECR_REGISTRY}/baykar-devops/mongodb:${GIT_SHA} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/frontend frontend=${ECR_REGISTRY}/baykar-devops/frontend:${GIT_SHA} -n ${{ env.NAMESPACE }}
          kubectl set image deployment/backend backend=${ECR_REGISTRY}/baykar-devops/backend:${GIT_SHA} -n ${{ env.NAMESPACE }}
          kubectl set image cronjob/etl etl=${ECR_REGISTRY}/baykar-devops/etl:${GIT_SHA} -n ${{ env.NAMESPACE }}

      - name: Verify ETL job execution
        if: steps.prerequisites.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.monitoring_only)
        run: |
          SHORT_SHA=$(printf '%s' "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-8)
          JOB_NAME="etl-smoke-${SHORT_SHA}"

          kubectl delete job "${JOB_NAME}" -n ${{ env.NAMESPACE }} --ignore-not-found=true
          kubectl create job --from=cronjob/etl "${JOB_NAME}" -n ${{ env.NAMESPACE }}
          kubectl wait --for=condition=complete job/"${JOB_NAME}" -n ${{ env.NAMESPACE }} --timeout=180s

      - name: Wait for rollouts to complete
        if: steps.prerequisites.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.monitoring_only)
        run: |
          echo "Waiting for MongoDB rollout..."
          kubectl rollout status statefulset/mongodb -n ${{ env.NAMESPACE }} --timeout=600s

          echo "Waiting for backend rollout..."
          kubectl rollout status deployment/backend -n ${{ env.NAMESPACE }} --timeout=180s
          
          echo "Waiting for frontend rollout..."
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=180s

          echo "Waiting for monitoring rollouts..."
          kubectl rollout status deployment/alertmanager -n monitoring --timeout=180s
          kubectl rollout status deployment/loki -n monitoring --timeout=180s
          kubectl rollout status daemonset/promtail -n monitoring --timeout=180s
          kubectl wait --for=condition=available deployment -l app.kubernetes.io/instance=monitoring-prometheus -n monitoring --timeout=180s
          kubectl wait --for=condition=available deployment -l app.kubernetes.io/instance=monitoring-grafana -n monitoring --timeout=180s

          echo "All deployments rolled out successfully."

      - name: Smoke test
        if: steps.prerequisites.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.monitoring_only)
        run: |
          for i in {1..20}; do
            FRONTEND_HOST=$(kubectl get svc frontend -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

            if [ -n "$FRONTEND_HOST" ]; then
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${FRONTEND_HOST}/api/readyz/" || echo "000")
            else
              HTTP_CODE="000"
            fi

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Smoke test passed against http://${FRONTEND_HOST}/api/readyz/"
              exit 0
            fi

            echo "Attempt $i: hostname='${FRONTEND_HOST:-pending}' HTTP $HTTP_CODE; retrying in 15s..."
            sleep 15
          done

          echo "Smoke test failed."
          exit 1

      - name: Gather application diagnostics on failure
        if: failure() && steps.prerequisites.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.monitoring_only)
        run: |
          echo "Application workloads"
          kubectl get all -n ${{ env.NAMESPACE }} -o wide || true

          echo "Application pod descriptions"
          kubectl describe pods -n ${{ env.NAMESPACE }} || true

          echo "MongoDB logs"
          kubectl logs statefulset/mongodb -n ${{ env.NAMESPACE }} --tail=200 || true

          echo "Application events"
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by=.lastTimestamp || true

      - name: Rollback on failure
        if: failure() && steps.prerequisites.outputs.ready == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.monitoring_only)
        run: |
          echo "Deployment failed. Rolling back if kubectl is configured..."

          if ! kubectl cluster-info >/dev/null 2>&1; then
            echo "kubectl is not configured; skipping rollback."
            exit 0
          fi

          kubectl rollout undo statefulset/mongodb -n ${{ env.NAMESPACE }} || true
          kubectl rollout undo deployment/backend -n ${{ env.NAMESPACE }} || true
          kubectl rollout undo deployment/frontend -n ${{ env.NAMESPACE }} || true
          echo "Rollback complete. Previous version restored."
