server {
    listen 8080;
    server_name _;

    # Where the React build output lives
    root /usr/share/nginx/html;
    index index.html;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # --- API Proxy ---
    # Any request to /api/* gets forwarded to the backend container.
    # This is why we changed the React code from "http://localhost:5050/record"
    # to "/api/record" — Nginx handles the routing at the edge.
    location /api/ {
        # "backend" is the Docker Compose service name.
        # Docker's internal DNS resolves it to the backend container's IP.
        proxy_pass http://backend:5050/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — don't let slow DB queries hang the proxy forever
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # --- React SPA Routing ---
    # React Router uses client-side routing. If someone refreshes on /edit/123,
    # Nginx needs to serve index.html (not return 404), and let React handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static Asset Caching ---
    # CRA puts content hashes in filenames, so we can cache aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
