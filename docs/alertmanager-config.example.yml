global:
  resolve_timeout: 5m

route:
  receiver: critical-webhook
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: critical-webhook
    webhook_configs:
      - url: https://example.invalid/alertmanager-webhook
        send_resolved: true
