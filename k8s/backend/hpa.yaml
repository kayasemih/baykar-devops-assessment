# ============================================================
# Backend — Horizontal Pod Autoscaler
# ============================================================
# Automatically scales the backend between 2-5 replicas based on CPU usage.
#
# How it works:
#   1. HPA checks average CPU% across all backend pods every 30s
#   2. If avg CPU > 70%, it adds pods (up to maxReplicas)
#   3. If avg CPU < 70%, it removes pods (down to minReplicas, with stabilization delay)
#
# The math: if 2 pods are at 80% CPU, HPA calculates:
#   desired = ceil(2 * 80/70) = ceil(2.28) = 3 pods
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: baykar-app
  labels:
    app: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    # Scale up aggressively — add up to 2 pods at once
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    # Scale down cautiously — wait 5 minutes before removing pods
    # This prevents flapping during traffic spikes
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
