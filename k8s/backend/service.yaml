# ============================================================
# Backend — Service (ClusterIP)
# ============================================================
# Internal-only service. Not exposed to the internet.
# Only the frontend Nginx proxy talks to this.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: baykar-app
  labels:
    app: backend
spec:
  type: ClusterIP    # Internal only — no external access
  selector:
    app: backend
  ports:
    - name: http
      port: 5050
      targetPort: 5050
      protocol: TCP
