# ============================================================
# Python ETL — CronJob
# ============================================================
# Runs ETL.py every hour. This is the Kubernetes-native way to schedule
# recurring tasks — no external cron daemon needed.
#
# Schedule: "0 * * * *" = at minute 0 of every hour
# ============================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etl
  namespace: baykar-app
  labels:
    app: etl
spec:
  schedule: "0 * * * *"    # Every hour, on the hour
  concurrencyPolicy: Forbid # Don't start a new job if the previous one is still running
  successfulJobsHistoryLimit: 3   # Keep last 3 successful job logs
  failedJobsHistoryLimit: 3       # Keep last 3 failed job logs for debugging
  jobTemplate:
    spec:
      # If the job hasn't finished in 5 minutes, kill it.
      # Our ETL script should complete in seconds — if it takes >5 min, something's wrong.
      activeDeadlineSeconds: 300
      backoffLimit: 2    # Retry up to 2 times on failure
      template:
        metadata:
          labels:
            app: etl
        spec:
          restartPolicy: OnFailure
          containers:
            - name: etl
              image: baykar-etl:latest
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
