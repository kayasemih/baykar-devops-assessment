# ============================================================
# Prometheus — Alert Rules
# ============================================================
# These are alerts I'd actually want to be woken up for.
# Each alert references the incident runbook for resolution steps.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  alert-rules.yml: |
    groups:
      - name: application
        rules:
          - alert: BackendDown
            expr: up{job="backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend is unreachable for >1 minute"
              description: "Prometheus cannot scrape the backend /metrics endpoint."

          - alert: HighErrorRate
            expr: |
              (
                sum(rate(http_requests_total{job="backend",status_code=~"5.."}[5m]))
                /
                clamp_min(sum(rate(http_requests_total{job="backend"}[5m])), 1)
              ) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Error rate exceeded 5% SLO threshold"
              description: "{{ $value | humanizePercentage }} of requests are failing."

          - alert: HighLatency
            expr: |
              histogram_quantile(
                0.95,
                sum by (le) (rate(http_request_duration_seconds_bucket{job="backend"}[5m]))
              ) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "API p95 latency exceeds 500ms"
              description: "Backend p95 latency is {{ $value }} seconds."
