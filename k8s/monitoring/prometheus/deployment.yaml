# ============================================================
# Prometheus — Deployment
# ============================================================
# Prometheus metrikleri toplar, alert rule'ları değerlendirir.
# Bu deployment monitoring namespace'inde çalışır.
#
# Production'da Prometheus Operator veya kube-prometheus-stack
# Helm chart'ı kullanılır — bu case study için vanilla kurulum
# yapıyorum çünkü "ne yaptığını biliyor" mesajı verir.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"   # 15 gün metrik tut
            - "--web.enable-lifecycle"                # API ile config reload yap
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: alert-rules
              mountPath: /etc/prometheus/alert-rules.yml
              subPath: alert-rules.yml
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: alert-rules
          configMap:
            name: prometheus-alert-rules
        - name: storage
          emptyDir: {}    # Production'da PVC kullan, yoksa restart'ta metrikler kaybolur
